<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="24" ry="24" fill="url(#bgGrad)" />

  <!-- Shield -->
  <path d="M44 22 L76 22 Q79 22 79 25 L79 52 Q79 70 60 78 Q41 70 41 52 L41 25 Q41 22 44 22 Z"
        fill="url(#shieldGrad)" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Checkmark -->
  <polyline points="51,49 58,57 70,39"
            fill="none" stroke="white" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- MediSync text -->
  <text x="60" y="100"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="0.5">MediSync</text>
</svg>
